name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "src/**"
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "docker-compose.yml"

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PR_TAG: pr-${{ github.event.number }}

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.PR_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.PR_TAG }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_WWV_EDITION=demo
            NEXT_PUBLIC_CESIUM_ION_TOKEN=${{ secrets.NEXT_PUBLIC_CESIUM_ION_TOKEN }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_BING_MAPS_KEY=${{ secrets.NEXT_PUBLIC_BING_MAPS_KEY }}
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Find or create preview comment
        uses: peter-evans/find-comment@v3
        id: find
        with:
          issue-number: ${{ github.event.number }}
          body-includes: "## PR Preview"

      - name: Post preview comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.number }}
          body: |
            ## PR Preview

            | Image | Size |
            |-------|------|
            | `ghcr.io/silvertakana/worldwideview:${{ env.PR_TAG }}` | `docker pull ghcr.io/silvertakana/worldwideview:${{ env.PR_TAG }}` |

            ### Run locally
            ```bash
            docker run -p 3000:3000 ghcr.io/silvertakana/worldwideview:${{ env.PR_TAG }}
            ```

            Edition: **demo**
            Commit: `${{ github.sha }}`
          edit-mode: replace
